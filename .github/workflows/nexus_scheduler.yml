name: NEXUS Scheduler

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  process-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Real-World News
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          THE_GUARDIAN_API_KEY: ${{ secrets.THE_GUARDIAN_API_KEY }}
          COMTRADE_API_KEY_PRIMARY: ${{ secrets.COMTRADE_API_KEY_PRIMARY }}
        run: python worker/run_scrapers.py

      - name: Run AI Trade Radar Batch Processor
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python worker/batch_processor.py
